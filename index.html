<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Башкорт Юлы</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --bg: #0b1310; --card: #12201b; --gold: #f59e0b; --green: #10b981; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; }
        .screen { display: none; padding: 20px; padding-bottom: 100px; }
        .screen.active { display: block; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 300px; gap: 10px; margin: 20px 0; }
        .p-zone { display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; border: 2px solid #fff; border-radius: 12px; }
        .score-board { display: flex; justify-content: space-around; font-size: 1.2rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="app-content">
        <div id="screen-lessons" class="screen active">
            <div id="user-info">Уровень: <span id="max-level">1</span> | XP: <span id="xp">0</span></div>
            <div id="lessons-container"></div>
        </div>
        <div id="screen-game" class="screen">
            <div class="score-board">P1:<span id="s1">0</span> P2:<span id="s2">0</span> P3:<span id="s3">0</span> P4:<span id="s4">0</span></div>
            <div id="game-word" style="text-align:center; font-size:2rem; color:var(--gold)">Нажми Старт</div>
            <div class="game-grid">
                <div class="p-zone" style="background:#ef4444" onclick="playerClick(1)">1</div>
                <div class="p-zone" style="background:#f59e0b" onclick="playerClick(2)">2</div>
                <div class="p-zone" style="background:#10b981" onclick="playerClick(3)">3</div>
                <div class="p-zone" style="background:#3b82f6" onclick="playerClick(4)">4</div>
            </div>
            <button onclick="startGame()" style="width:100%; padding:15px">Старт</button>
        </div>
    </div>
    
    <div class="bottom-nav" style="position:fixed; bottom:0; width:100%; background:#12201b; display:flex; justify-content:space-around; padding:15px;">
        <div onclick="switchTab('lessons', this)">📚 Уроки</div>
        <div onclick="switchTab('game', this)">🎮 Игра</div>
    </div>

    <script>
        let maxLevel = parseInt(localStorage.getItem('max_lvl')) || 1;
        let xp = parseInt(localStorage.getItem('xp')) || 0;
        let scores = [0,0,0,0];
        let gameActive = false;
        const words = ["Атай", "Әсәй", "Өфө", "Биш", "Һыу", "Ат", "Йәй", "Байрам", "Урман", "Өй", "Китап", "Мәктәп", "Уҡытыусы", "Башҡорт", "Тыуған", "Ер", "Тау", "Ҡояш", "Ай", "Йондоҙ", "Көҙ", "Ҡыш", "Яҙ", "Сәй", "Икмәк", "Балыҡ", "Ҡош", "Эт", "Мәсет", "Егет"];

        // Генерация 30 уроков
        const lessonsData = Array.from({length: 30}, (_, i) => ({
            q: "Урок " + (i+1), text: "Слово №" + (i+1), correct: "слово" + (i+1)
        }));

        function renderLessons() {
            const container = document.getElementById('lessons-container');
            container.innerHTML = lessonsData.map((l, i) => `
                <div class="lesson-card" style="${i+1 > maxLevel ? 'opacity:0.3' : ''}">
                    <h3>${l.q}</h3>
                    <input id="in-${i+1}" placeholder="Ответ">
                    <button onclick="check(${i+1})">Проверить</button>
                </div>
            `).join('');
        }

        function check(num) {
            if (num !== maxLevel) return alert("Пройди предыдущий!");
            maxLevel++;
            xp += 10;
            localStorage.setItem('max_lvl', maxLevel);
            localStorage.setItem('xp', xp);
            renderLessons();
            document.getElementById('max-level').innerText = maxLevel;
            document.getElementById('xp').innerText = xp;
        }

        function startGame() {
            document.getElementById('game-word').innerText = words[Math.floor(Math.random()*words.length)];
            gameActive = true;
        }

        function playerClick(p) {
            if(!gameActive) return;
            scores[p-1]++;
            document.getElementById('s'+p).innerText = scores[p-1];
            gameActive = false;
            document.getElementById('game-word').innerText = "Победил P" + p;
        }

        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }

        renderLessons();
    </script>
</body>
</html>
