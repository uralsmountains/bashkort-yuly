<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Башкорт Юлы | Интерактив</title>
    <style>
        :root {
            --bg-color: #0b1310; --card-bg: #12201b; --border-color: #1b332b;
            --text-main: #e2e8f0; --accent-green: #10b981; --accent-gold: #f59e0b; --error-red: #ef4444;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--card-bg); padding: 15px 20px; text-align: center; border-bottom: 1px solid var(--border-color); font-size: 1.2rem; font-weight: bold; color: #fff; z-index: 10; }
        header span { color: var(--accent-green); }
        .app-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .screen { display: none; animation: fadeIn 0.2s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Уроки */
        .lesson-card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 15px; transition: 0.3s; }
        .lesson-card.locked { opacity: 0.4; filter: blur(2px); pointer-events: none; position: relative; }
        .lesson-card h2 { margin-top: 0; color: var(--accent-gold); font-size: 1.1rem; margin-bottom: 10px; }
        .lesson-card p { font-size: 0.95rem; margin-bottom: 12px; line-height: 1.4; }
        
        /* Кнопки теста */
        .quiz-option { background: rgba(255, 255, 255, 0.05); padding: 12px; margin: 6px 0; border-radius: 12px; border: 1px solid var(--border-color); cursor: pointer; font-size: 0.95rem; }
        .quiz-option.correct { background: var(--accent-green) !important; color: #fff; pointer-events: none; border-color: var(--accent-green); }
        .quiz-option.wrong { background: var(--error-red) !important; color: #fff; border-color: var(--error-red); }
        
        /* Ввод текста (новые уровни) */
        .level-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--accent-gold); background: rgba(0,0,0,0.2); color: white; font-size: 1rem; box-sizing: border-box; margin-bottom: 10px; }
        .level-btn { background: var(--accent-green); color: white; padding: 12px; border: none; border-radius: 12px; width: 100%; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .level-hint { font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; display: block; }

        /* Словарь и Чат */
        .search-bar { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--card-bg); color: white; font-size: 1rem; box-sizing: border-box; margin-bottom: 15px; position: sticky; top: 0; }
        .word-item { background: var(--card-bg); padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .word-bash { color: var(--accent-green); font-weight: bold; }
        
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 170px); }
        .chat-box { flex-grow: 1; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
        .message { padding: 12px 16px; border-radius: 14px; max-width: 85%; line-height: 1.4; font-size: 0.95rem; }
        .msg-bot { background: rgba(16, 185, 129, 0.15); align-self: flex-start; border-left: 3px solid var(--accent-green); }
        .msg-user { background: rgba(245, 158, 11, 0.15); align-self: flex-end; border-right: 3px solid var(--accent-gold); }
        .chat-input { display: flex; gap: 8px; }
        .chat-input input { flex-grow: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--card-bg); color: white; }
        .chat-input button { background: var(--accent-green); color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; }

        /* Навигация */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 10px 0 20px; border-top: 1px solid var(--border-color); z-index: 100; }
        .nav-item { color: #64748b; text-align: center; font-size: 0.75rem; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .nav-item.active { color: var(--accent-green); font-weight: bold; }
        .nav-icon { font-size: 1.2rem; }
    </style>
</head>
<body>

    <header id="header-title">Башкорт <span>Юлы</span></header>

    <div class="app-content">
        <!-- УРОКИ -->
        <div id="screen-lessons" class="screen active">
            <div id="lessons-container"></div>
        </div>

        <!-- СЛОВАРЬ -->
        <div id="screen-dict" class="screen">
            <input type="text" id="dict-search" class="search-bar" placeholder="Поиск по базе данных..." oninput="filterDictionary()">
            <div id="words-list">Загрузка базы...</div>
        </div>

        <!-- ИИ-ЧАТ -->
        <div id="screen-ai" class="screen">
            <div class="chat-container">
                <div class="chat-box" id="chat-box">
                    <div class="message msg-bot">Һаумыһығыҙ! Я обновил свои знания. 🧠<br><br>Спроси меня про историю Башкортостана, про районы и деревни, или попроси перевести любое слово!</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="user-input" placeholder="Напиши вопрос или слово..." onkeydown="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('lessons', this)"><span class="nav-icon">📚</span><span>Уроки</span></div>
        <div class="nav-item" onclick="switchTab('dict', this)"><span class="nav-icon">📖</span><span>Словарь</span></div>
        <div class="nav-item" onclick="switchTab('ai', this)"><span class="nav-icon">🤖</span><span>Чат</span></div>
    </div>

    <script>
        // ----------------- ЛОГИКА УРОКОВ -----------------
        const lessonsData = [
            { type: 'choice', q: "Урок 1: Приветствие", text: "Как вежливо сказать «Здравствуйте»?", a1: "Һаумыһығыҙ", a2: "Рәхмәт", correct: 1 },
            { type: 'input', q: "Урок 2: Практика", text: "Напиши перевод фразы: «Меня зовут Урал»", hint: "Подсказка: используй слова 'Минең исемем...'", correct: "Минең исемем Урал" },
            { type: 'choice', q: "Урок 3: Город", text: "Как пишется «Уфа» на башкирском?", a1: "Өфө", a2: "Уфа", correct: 1 },
            { type: 'input', q: "Урок 4: Чувства", text: "Переведи: «Я люблю Башкортостан»", hint: "Подсказка: Мин Башҡортостанды...", correct: "Мин Башҡортостанды яратам" },
            { type: 'choice', q: "Урок 5: Семья", text: "Выберите перевод слова «Мама»:", a1: "Атай", a2: "Әсәй", correct: 2 },
            { type: 'input', q: "Урок 6: Блиц-перевод", text: "Напиши слово «Спасибо» на башкирском", hint: "Без опечаток!", correct: "Рәхмәт" },
            { type: 'choice', q: "Урок 7: Цвета", text: "Как сказать «Красный»?", a1: "Күк", a2: "Ҡыҙыл", correct: 2 },
            { type: 'choice', q: "Урок 8: Природа", text: "Что означает слово «Урман»?", a1: "Лес", a2: "Озеро", correct: 1 },
            { type: 'input', q: "Урок 9: Представление", text: "Переведи: «Я из Уфы»", hint: "Подсказка: Мин Өфөнән", correct: "Мин Өфөнән" },
            { type: 'choice', q: "Урок 10: Животные", text: "Переведите слово «Собака»:", a1: "Ат", a2: "Эт", correct: 2 }
        ];

        function renderLessons() {
            const container = document.getElementById('lessons-container');
            let html = '';
            
            lessonsData.forEach((l, i) => {
                const lockedClass = i === 0 ? '' : 'locked';
                if (l.type === 'choice') {
                    html += `
                        <div class="lesson-card ${lockedClass}" id="lesson-${i+1}">
                            <h2>${l.q}</h2><p>${l.text}</p>
                            <div class="quiz-option" onclick="checkChoice(this, ${l.correct === 1}, ${i+1})">${l.a1}</div>
                            <div class="quiz-option" onclick="checkChoice(this, ${l.correct === 2}, ${i+1})">${l.a2}</div>
                        </div>`;
                } else if (l.type === 'input') {
                    html += `
                        <div class="lesson-card ${lockedClass}" id="lesson-${i+1}">
                            <h2>${l.q} ✍️</h2><p>${l.text}</p>
                            <span class="level-hint">${l.hint}</span>
                            <input type="text" id="input-${i+1}" class="level-input" placeholder="Введи ответ сюда...">
                            <button id="btn-${i+1}" class="level-btn" onclick="checkInput(${i+1}, '${l.correct}')">Проверить</button>
                        </div>`;
                }
            });
            container.innerHTML = html;
        }
        renderLessons();

        function unlockNext(num) {
            const next = document.getElementById('lesson-' + (num + 1));
            if (next) {
                setTimeout(() => {
                    next.classList.remove('locked');
                    next.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 500);
            }
        }

        function checkChoice(btn, isCorrect, num) {
            if (isCorrect) {
                btn.classList.add('correct');
                unlockNext(num);
            } else {
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 800);
            }
        }

        function checkInput(num, correctAns) {
            const inputVal = document.getElementById(`input-${num}`).value.trim().toLowerCase().replace(/[.,!]/g, '');
            const targetVal = correctAns.toLowerCase().replace(/[.,!]/g, '');
            const btn = document.getElementById(`btn-${num}`);
            
            if (inputVal === targetVal) {
                btn.innerText = "Правильно! 🎉";
                btn.style.background = "var(--accent-green)";
                unlockNext(num);
            } else {
                btn.innerText = "Ошибка, попробуй еще!";
                btn.style.background = "var(--error-red)";
                setTimeout(() => { btn.innerText = "Проверить"; btn.style.background = "var(--accent-green)"; }, 1500);
            }
        }

        // ----------------- СЛОВАРЬ И JSON -----------------
        let dictionaryData = [];
        async function loadDictionary() {
            try {
                const response = await fetch('dictionary.json?' + new Date().getTime());
                dictionaryData = await response.json();
                displayWords(dictionaryData);
            } catch (e) { document.getElementById('words-list').innerText = 'Ошибка загрузки базы.'; }
        }
        window.onload = loadDictionary;

        function displayWords(words) {
            const list = document.getElementById('words-list');
            list.innerHTML = words.length ? '' : 'Слово не найдено';
            words.forEach(w => {
                list.innerHTML += `<div class="word-item"><div><span class="word-bash">${w.b}</span> — <span>${w.r}</span></div></div>`;
            });
        }
        function filterDictionary() {
            const query = document.getElementById('dict-search').value.toLowerCase().trim();
            displayWords(dictionaryData.filter(w => w.b.toLowerCase().includes(query) || w.r.toLowerCase().includes(query)));
        }
        function switchTab(tabId, element) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + tabId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }

        // ----------------- УМНЫЙ ИИ-ЧАТ -----------------
        function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="message msg-user">${msg}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                let reply = "";
                const cleanMsg = msg.toLowerCase();
                
                // 1. Проверка на знания ИСТОРИИ
                if (cleanMsg.includes('истори')) {
                    reply = "📜 **История Башкортостана велика!**<br>В 1557 году башкирские племена добровольно вошли в состав России. В 1919 году была образована Башкирская АССР — первая национальная автономия в стране. А наши батыры, такие как Салават Юлаев, навсегда остались в легендах. Эпосы вроде «Урал-батыра» хранят древнейшие мифы Евразии.";
                }
                // 2. Проверка на знания ГЕОГРАФИИ (Районы и деревни)
                else if (cleanMsg.includes('район') || cleanMsg.includes('деревн') || cleanMsg.includes('ауыл')) {
                    reply = "🗺️ В Башкортостане целых **54 района** и тысячи деревень!<br><br>Например, живописный **Абзелиловский район** славится своими озерами и такими потрясающими местами, как Старобалапаново или райцентр Аскарово. А Бурзянский район известен диким бортевым медом и пещерой Шульган-Таш. Про какой район рассказать подробнее?";
                }
                // 3. Стандартный поиск слов по словарю
                else {
                    let cleanWord = cleanMsg.replace(/(что значит слово|как переводится|перевод|что такое)\s+/gi, '').replace(/[?.,!]/g, '').trim();
                    const foundWord = dictionaryData.find(w => w.r.toLowerCase() === cleanWord || w.b.toLowerCase() === cleanWord);
                    
                    if (foundWord) {
                        reply = `✅ Перевод слова **${cleanWord}**:<br>🇷🇺 Рус: **${foundWord.r}**<br> Bash: **${foundWord.b}**`;
                    } else if (cleanWord.includes('сабантуй')) {
                        reply = "🌾 Сабантуй — великий праздник плуга. Скачки, куреш и много веселья!";
                    } else {
                        reply = `Хм, я пока не знаю слово "${cleanWord}", и в нашей базе данных его нет. Но я быстро учусь!`;
                    }
                }

                chatBox.innerHTML += `<div class="message msg-bot">${reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
