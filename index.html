<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Башкорт Юлы | Платформа</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12201b">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Башкорт Юлы">
    <style>
        :root { --bg-color: #0b1310; --card-bg: #12201b; --border-color: #1b332b; --text-main: #e2e8f0; --accent-green: #10b981; --accent-gold: #f59e0b; --error-red: #ef4444; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--card-bg); padding: 15px 20px; text-align: center; border-bottom: 1px solid var(--border-color); font-size: 1.2rem; font-weight: bold; color: #fff; z-index: 10; }
        header span { color: var(--accent-green); }
        .app-content { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .screen { display: none; animation: fadeIn 0.2s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Добавочные стили для игры */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 300px; gap: 10px; margin: 20px 0; }
        .p-zone { display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; border: 3px solid #fff; border-radius: 12px; font-weight: bold; }
        .score-board { display: flex; justify-content: space-around; font-size: 1.5rem; background: var(--card-bg); padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        /* Твои стили сохранены */
        .rating-panel { background: linear-gradient(135deg, #132720, #1b332b); padding: 15px; border-radius: 14px; margin-bottom: 20px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .rating-title { font-size: 0.85rem; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 1px; }
        .rating-val { font-size: 1.2rem; font-weight: bold; color: #fff; margin-top: 4px; }
        .lesson-card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        .lesson-card.locked { opacity: 0.35; filter: blur(2px); pointer-events: none; }
        .quiz-option { background: rgba(255, 255, 255, 0.05); padding: 13px; margin: 6px 0; border-radius: 12px; border: 1px solid var(--border-color); cursor: pointer; }
        .quiz-option.correct { background: var(--accent-green) !important; }
        .quiz-option.wrong { background: var(--error-red) !important; }
        .level-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: white; margin-bottom: 10px; }
        .level-btn { background: var(--accent-green); color: white; padding: 12px; border: none; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .level-hint { display: none; color: var(--accent-gold); padding: 10px; border: 1px dashed var(--accent-gold); border-radius: 10px; margin-bottom: 10px; }
        .search-bar { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--card-bg); color: white; margin-bottom: 15px; }
        .word-item { background: var(--card-bg); padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border-color); }
        .alpha-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; margin-bottom: 25px; }
        .alpha-letter { background: var(--card-bg); border: 1px solid var(--border-color); padding: 12px 0; text-align: center; border-radius: 10px; font-size: 1.2rem; font-weight: bold; }
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 170px); }
        .chat-box { flex-grow: 1; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); padding: 15px; overflow-y: auto; margin-bottom: 12px; }
        .message { padding: 12px 16px; border-radius: 14px; margin-bottom: 8px; }
        .msg-bot { background: rgba(16, 185, 129, 0.12); align-self: flex-start; }
        .msg-user { background: rgba(245, 158, 11, 0.12); align-self: flex-end; }
        .chat-input { display: flex; gap: 8px; }
        .chat-input input { flex-grow: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--card-bg); color: white; }
        .chat-input button { background: var(--accent-green); color: white; border: none; padding: 0 20px; border-radius: 12px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 10px 0 22px; border-top: 1px solid var(--border-color); z-index: 100; }
        .nav-item { color: #64748b; text-align: center; font-size: 0.75rem; cursor: pointer; }
        .nav-item.active { color: var(--accent-green); font-weight: bold; }
        .nav-icon { font-size: 1.2rem; }
    </style>
</head>
<body>   
    <header id="header-title">Башкорт <span>Юлы</span></header>
    <div class="app-content">
        <div id="screen-lessons" class="screen active">
            <div class="rating-panel">
                <div><div class="rating-title">Ваш статус</div><div class="rating-val" id="user-rank">Новичок (Өйрәнеүсе)</div></div>
                <div style="text-align: right;"><div class="rating-title">Очки опыта</div><div class="rating-val" id="user-score">0 XP</div></div>
            </div>
            <div id="lessons-container"></div>
        </div>
        <div id="screen-dict" class="screen">
            <input type="text" id="dict-search" class="search-bar" placeholder="Поиск..." oninput="filterDictionary()">
            <div id="words-list">Синхронизация с базой слов...</div>
        </div>
        <div id="screen-alphabet" class="screen">
            <h2 style="color: var(--accent-gold); font-size: 1.2rem;">9 особых букв</h2>
            <div class="alpha-grid">
                <div class="alpha-letter">Ә ә</div><div class="alpha-letter">Ө ө</div><div class="alpha-letter">Ү ү</div>
                <div class="alpha-letter">Ғ ғ</div><div class="alpha-letter">Ҡ ҡ</div><div class="alpha-letter">Ң ң</div>
                <div class="alpha-letter">Һ һ</div><div class="alpha-letter">Ҙ ҙ</div><div class="alpha-letter">Ҫ ҫ</div>
            </div>
        </div>
        <div id="screen-ai" class="screen">
            <div class="chat-container">
                <div class="chat-box" id="chat-box"></div>
                <div class="chat-input"><input type="text" id="user-input" placeholder="Спроси меня..."> <button onclick="sendMessage()">➤</button></div>
            </div>
        </div>
        <div id="screen-game" class="screen">
            <div class="score-board">P1:<span id="s1">0</span> P2:<span id="s2">0</span> P3:<span id="s3">0</span> P4:<span id="s4">0</span></div>
            <div id="game-word" style="text-align:center; font-size:2rem; color:var(--accent-gold); margin: 20px;">Әлләсә (Alias)</div>
            <div class="game-grid">
                <div class="p-zone" style="background:#ef4444" onclick="playerClick(0)">1</div>
                <div class="p-zone" style="background:#f59e0b" onclick="playerClick(1)">2</div>
                <div class="p-zone" style="background:#10b981" onclick="playerClick(2)">3</div>
                <div class="p-zone" style="background:#3b82f6" onclick="playerClick(3)">4</div>
            </div>
            <button onclick="startGame()" class="level-btn">Старт/След. слово</button>
        </div>
    </div>
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('lessons', this)"><span class="nav-icon">📚</span><span>Уроки</span></div>
        <div class="nav-item" onclick="switchTab('dict', this)"><span class="nav-icon">📖</span><span>Словарь</span></div>
        <div class="nav-item" onclick="switchTab('alphabet', this)"><span class="nav-icon">Аа</span><span>Алфавит</span></div>
        <div class="nav-item" onclick="switchTab('ai', this)"><span class="nav-icon">🤖</span><span>ИИ</span></div>
        <div class="nav-item" onclick="switchTab('game', this)"><span class="nav-icon">🎮</span><span>Әлләсә</span></div>
    </div>

<script>
    let xpScore = parseInt(localStorage.getItem('bashkort_xp')) || 0;
    let maxLvl = parseInt(localStorage.getItem('max_lvl')) || 1;
    let scores = [0,0,0,0];
    let gameActive = false;
    const words = ["Батыр", "Ҡурай", "Урал", "Сәсән", "Өфө", "Йәй", "Байрам", "Урман", "Өй", "Китап"];

    // 30 уроков
    const lessonsData = Array.from({length: 30}, (_, i) => ({q: "Урок " + (i+1), id: i+1}));

    function renderLessons() {
        const container = document.getElementById('lessons-container');
        container.innerHTML = lessonsData.map((l, i) => `
            <div class="lesson-card ${i+1 > maxLvl ? 'locked' : ''}">
                <h2>${l.q}</h2>
                <button class="level-btn" onclick="check(${l.id})">Выполнить</button>
            </div>
        `).join('');
    }

    function check(num) {
        if (num > maxLvl) return alert("Пройди предыдущий!");
        if (num === maxLvl) { maxLvl++; xpScore += 10; }
        localStorage.setItem('max_lvl', maxLvl);
        localStorage.setItem('bashkort_xp', xpScore);
        renderLessons();
        updateRank();
    }

    // Логика игры
    function startGame() { gameActive = true; document.getElementById('game-word').innerText = words[Math.floor(Math.random()*words.length)]; }
    function playerClick(p) { if(gameActive) { scores[p]++; document.getElementById('s'+(p+1)).innerText = scores[p]; gameActive = false; document.getElementById('game-word').innerText = "Победа P" + (p+1); } }

    function updateRank() {
        document.getElementById('user-score').innerText = xpScore + " XP";
        document.getElementById('user-rank').innerText = xpScore > 100 ? "Батыр" : "Новичок";
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + tabId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    renderLessons();
    updateRank();

    // Заглушки для словаря и ИИ (твои исходные функции должны быть здесь)
    function sendMessage() {
        const input = document.getElementById('user-input');
        if (!input.value) return;
        document.getElementById('chat-box').innerHTML += `<div class="message msg-user">${input.value}</div>`;
        input.value = '';
    }
</script>
</body>
</html>
